<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center p-6 md:p-12 relative z-10">
<!-- Background Decor -->
<div class="absolute inset-0 z-[-1] overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-primary-container/20 blur-3xl opacity-50 mix-blend-multiply"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60%] h-[60%] rounded-full bg-secondary-container/20 blur-3xl opacity-50 mix-blend-multiply"></div>
</div>
<div class="w-full max-w-lg bg-surface-container-lowest rounded-xl p-8 md:p-12 relative shadow-[0_20px_40px_rgba(53,51,40,0.04),0_8px_16px_rgba(53,51,40,0.02)] border border-outline-variant/10">
<!-- Header Section -->

<div class="w-16 h-16 bg-surface-container-low rounded-full flex items-center justify-center mx-auto mb-6">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">link</span>
</div>
<h1 class="font-display text-4xl md:text-5xl font-bold text-on-surface mb-4 tracking-tight leading-tight">Connect Your System</h1>
<p class="font-body text-on-surface-variant text-base md:text-lg max-w-sm mx-auto">Enter your developer credentials to synchronize your EcoFlow devices.</p>
</div>
<!-- Form Section -->
<form class="space-y-6">
<!-- Input: Access Key -->
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface uppercase tracking-wider pl-4" for="accessKey">Access Key</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-xl">key</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-lg text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-colors font-body" id="accessKey" name="accessKey" placeholder="e.g. AKIAIOSFODNN7EXAMPLE" type="text"/>
</div>
</div>
<!-- Input: Secret Key -->
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface uppercase tracking-wider pl-4" for="secretKey">Secret Key</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-xl">password</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-lg text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-colors font-body" id="secretKey" name="secretKey" placeholder="••••••••••••••••••••••••" type="password"/>
</div>
</div>
<!-- Input: API Endpoint URL -->
<div class="space-y-2">
<label class="block font-label text-sm font-medium text-on-surface uppercase tracking-wider pl-4" for="endpointUrl">API Endpoint URL</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant text-xl">public</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-none rounded-lg text-on-surface placeholder:text-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:bg-surface-container-highest transition-colors font-body" id="endpointUrl" name="endpointUrl" placeholder="https://api.ecoflow.com/v1" type="url"/>
</div>
</div>

<div class="pt-6 space-y-4">
<button class="w-full py-5 rounded-xl btn-gradient text-on-primary font-label text-lg font-bold tracking-wide hover:opacity-90 transition-opacity flex items-center justify-center gap-2" type="button">
<span>Authorize &amp; Sync</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">sync</span>
</button>

<a class="inline-block font-label text-sm text-on-surface-variant hover:text-primary transition-colors underline decoration-outline-variant/30 underline-offset-4 uppercase tracking-widest" href="#">
