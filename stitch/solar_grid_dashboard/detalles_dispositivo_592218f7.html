<body class="bg-surface text-on-surface font-body pb-32 antialiased selection:bg-primary-container selection:text-on-primary-container min-h-screen relative">
<!-- Top Navigation -->
<header class="flex justify-between items-center px-6 py-4 w-full docked top-0 bg-[#fef9ef]/80 dark:bg-stone-950/80 backdrop-blur-lg z-40">
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low text-on-surface-variant hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-['Space_Grotesk'] font-bold text-lg tracking-tight text-[#353328] dark:text-[#fef9ef]">EcoFlow DELTA Pro 3</h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full bg-surface-container-low text-on-surface-variant hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface">settings</span>
</button>
</header>
<main class="max-w-7xl mx-auto px-6 mt-6 flex flex-col gap-8 lg:gap-12 pb-24">
<!-- Energy Flow Diagram -->
<section class="bg-surface-container-low rounded-xl p-8 flex flex-col md:flex-row justify-between items-center gap-8 relative overflow-hidden">
<div class="flex flex-col items-center gap-4 z-10">
<div class="w-20 h-20 rounded-full bg-tertiary-container/20 flex items-center justify-center relative shadow-[0_20px_40px_rgba(53,51,40,0.04),0_8px_16px_rgba(53,51,40,0.02)]">
<span class="material-symbols-outlined text-4xl text-tertiary-fixed" style="font-variation-settings: 'FILL' 1;">solar_power</span>
</div>
<span class="font-label text-sm text-on-surface-variant uppercase tracking-wider">Solar</span>
</div>
<!-- Flow Line 1 -->
<div class="hidden md:block flex-1 h-2 bg-surface-container rounded-full relative overflow-hidden">
<div class="absolute top-0 left-0 h-full w-1/3 bg-gradient-to-r from-transparent via-tertiary-fixed to-transparent opacity-50"></div>
</div>
<div class="flex flex-col items-center gap-4 z-10">
<div class="w-24 h-24 rounded-[2rem] bg-primary/10 flex items-center justify-center relative shadow-[0_20px_40px_rgba(53,51,40,0.04),0_8px_16px_rgba(53,51,40,0.02)] border-2 border-primary/20">
<span class="material-symbols-outlined text-5xl text-primary" style="font-variation-settings: 'FILL' 1;">battery_charging_full</span>
</div>
<span class="font-label text-sm text-on-surface-variant uppercase tracking-wider">DELTA Pro 3</span>
</div>
<!-- Flow Line 2 -->
<div class="hidden md:block flex-1 h-2 bg-surface-container rounded-full relative overflow-hidden">
<div class="absolute top-0 right-0 h-full w-1/3 bg-gradient-to-l from-transparent via-secondary-fixed to-transparent opacity-50"></div>
</div>
<div class="flex flex-col items-center gap-4 z-10">
<div class="w-20 h-20 rounded-full bg-secondary-container/20 flex items-center justify-center relative shadow-[0_20px_40px_rgba(53,51,40,0.04),0_8px_16px_rgba(53,51,40,0.02)]">
<span class="material-symbols-outlined text-4xl text-secondary-fixed" style="font-variation-settings: 'FILL' 1;">home</span>
</div>
<span class="font-label text-sm text-on-surface-variant uppercase tracking-wider">Home</span>
</div>
<!-- Mobile Flow indicators (Vertical) -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 md:hidden flex flex-col gap-12 text-surface-container-highest">
<span class="material-symbols-outlined rotate-90 text-3xl opacity-50">keyboard_double_arrow_right</span>
<span class="material-symbols-outlined rotate-90 text-3xl opacity-50">keyboard_double_arrow_right</span>
</div>
</section>
<!-- Main Dashboard Grid -->
<div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
<!-- Central Gauge (Solar Input) -->
<section class="lg:col-span-7 bg-surface-container flex flex-col items-center justify-center p-12 rounded-xl relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
<h2 class="font-label text-on-surface-variant text-sm uppercase tracking-widest mb-4 z-10">Energy Balance</h2>
<div class="relative w-full max-w-md aspect-[4/3] flex flex-col items-center justify-center z-10">
<svg class="w-full h-full" viewbox="0 0 200 150">
<!-- Gauge Track -->
<path d="M30 120 A 80 80 0 0 1 170 120" fill="none" stroke="#e7e2d3" stroke-linecap="round" stroke-width="12"></path>
<!-- Dynamic Difference Arc (Solar > Consumption example: Green) -->
<!-- Solar at ~85% (150 deg), Consumption at ~60% (110 deg) -->
<path d="M74 54 A 80 80 0 0 1 140 54" fill="none" stroke="#94f990" stroke-opacity="0.6" stroke-width="12"></path>
<!-- Ticks -->
<g stroke="#b6b2a3" stroke-width="1">
<line x1="30" x2="35" y1="120" y2="115"></line>
<line x1="170" x2="165" y1="120" y2="115"></line>
<line x1="100" x2="100" y1="40" y2="48"></line>
</g>
<!-- Scale Labels -->
<g fill="#625f53" font-family="Space Grotesk" font-size="8" text-anchor="middle">
<text x="25" y="135">0</text>
<text x="100" y="35">600W</text>
<text x="175" y="135">1200W</text>
</g>
<!-- Needle: Consumption (Grey/Outline) -->
<g transform="rotate(110, 100, 120)">
<line stroke="#7e7b6e" stroke-linecap="round" stroke-width="3" x1="100" x2="100" y1="120" y2="55"></line>
<circle cx="100" cy="120" fill="#7e7b6e" r="4"></circle>
</g>
<!-- Needle: Solar Input (Primary) -->
<g transform="rotate(150, 100, 120)">
<line stroke="#974a00" stroke-linecap="round" stroke-width="4" x1="100" x2="100" y1="120" y2="45"></line>
<circle cx="100" cy="120" fill="#974a00" r="6"></circle>
<circle cx="100" cy="120" fill="#ffaf78" r="2"></circle>
</g>
</svg>
<!-- Numerical Readouts -->
<div class="flex justify-between w-full px-8 -mt-4">
<div class="flex flex-col items-center">
<span class="text-[10px] uppercase tracking-tighter text-on-surface-variant font-label">Solar Input</span>
<span class="font-display text-2xl font-bold text-primary">1250<span class="text-xs ml-0.5">W</span></span>
</div>
<div class="flex flex-col items-center">
<span class="text-[10px] uppercase tracking-tighter text-on-surface-variant font-label">Consumption</span>
<span class="font-display text-2xl font-bold text-outline">800<span class="text-xs ml-0.5">W</span></span>
</div>
</div>
<!-- Status Indicator -->
<div class="mt-6 px-4 py-1.5 bg-secondary-container/30 rounded-full border border-secondary/10 flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-secondary animate-pulse"></span>
<span class="font-label text-xs font-semibold text-on-secondary-container uppercase tracking-widest">Surplus Energy</span>
</div>
</div></section>
<!-- Stats Column -->
<section class="lg:col-span-5 flex flex-col gap-8">
<!-- Battery SOC -->
<div class="bg-surface-container-low rounded-xl p-6 flex flex-col justify-between relative overflow-hidden">
<div class="flex justify-between items-start mb-6 z-10">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">battery_5_bar</span>
</div>
<span class="font-label text-on-surface-variant text-sm uppercase tracking-widest">Battery SOC</span>
</div>
<span class="font-display text-3xl text-on-surface">85%</span>
</div>
<!-- Minimal Sparkline representation -->
<div class="w-full h-16 flex items-end gap-1 opacity-50 z-10">
<div class="flex-1 bg-surface-container-highest rounded-t-sm h-[60%]"></div>
<div class="flex-1 bg-surface-container-highest rounded-t-sm h-[65%]"></div>
<div class="flex-1 bg-surface-container-highest rounded-t-sm h-[75%]"></div>
<div class="flex-1 bg-surface-container-highest rounded-t-sm h-[80%]"></div>
<div class="flex-1 bg-primary-container rounded-t-sm h-[85%]"></div>
</div>
</div>
<!-- Output Power -->
<div class="bg-surface-container-low rounded-xl p-6 flex flex-col justify-between relative overflow-hidden">
<div class="flex justify-between items-start mb-6 z-10">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-secondary/10 flex items-center justify-center">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">power</span>
</div>
<span class="font-label text-on-surface-variant text-sm uppercase tracking-widest">Output</span>
</div>
<span class="font-display text-3xl text-on-surface">0.8<span class="text-xl text-on-surface-variant ml-1">kW</span></span>
</div>
<!-- Soft curve representation -->
<div class="w-full h-16 relative z-10">
<svg class="w-full h-full text-secondary-container opacity-40" preserveaspectratio="none" viewbox="0 0 100 30">
<path d="M0,30 Q20,10 50,20 T100,15 L100,30 L0,30 Z" fill="currentColor"></path>
<path class="opacity-100" d="M0,30 Q20,10 50,20 T100,15" fill="none" stroke="#006f1d" stroke-width="1.5"></path>
</svg>
</div>
</div>
<!-- Temperature -->
<div class="bg-surface-container-low rounded-xl p-6 flex items-center justify-between">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant">device_thermostat</span>
</div>
<div class="flex flex-col">
<span class="font-label text-on-surface-variant text-xs uppercase tracking-widest">Internal Temp</span>
<span class="font-display text-2xl text-on-surface mt-1">35°C</span>
</div>
</div>
<div class="px-4 py-2 bg-secondary-container/50 rounded-full">
<span class="font-label text-xs text-on-secondary-container uppercase tracking-wider font-semibold">Optimal</span>
</div>
</div>
</section>
</div>
</main>

<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-lg z-50 flex justify-around items-center p-2 bg-[#fef9ef]/70 dark:bg-stone-900/70 backdrop-blur-2xl shadow-[0_20px_40px_rgba(53,51,40,0.06),0_8px_16px_rgba(53,51,40,0.03)] rounded-full">

<button class="flex flex-col items-center justify-center bg-gradient-to-br from-[#974a00] to-[#ffaf78] text-white rounded-full px-6 py-2 shadow-lg active:scale-90 transition-transform duration-300 ease-out">

<span class="font-['Space_Grotesk'] font-medium text-[10px] uppercase tracking-widest mt-1">History</span>
</button>

<span class="font-['Space_Grotesk'] font-medium text-[10px] uppercase tracking-widest mt-1">Alerts</span>
